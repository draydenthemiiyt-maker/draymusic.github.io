<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <title>DrayMusic</title>
    <link rel="stylesheet" href="style.css">
    <link href="google.css" rel="stylesheet">
    <style>
        #errorScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #640000;
            font-family: system-ui;
        }

            #errorScreen[hidden] {
                display: none;
            }

        .error-inner {
            text-align: center;
        }

        .error-title {
            margin: 0 0 8px;
            color: #fff;
            font-size: 1.6rem;
        }

        .error-message {
            margin: 0 0 18px;
            color: #fff;
            line-height: 1.4;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 16px;
        }

            .btn:hover {
                background: #ffffff30;
            }

            .btn:active {
                background: #fff;
                color: #000;
            }
    </style>
</head>
<body class="native-app">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">
    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>
    <main id="songList" class="scroll-area">
    </main>
    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>
            <div class="action-btns">
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>
    <div id="errorScreen" aria-live="assertive" role="alert" hidden>
        <div class="error-inner">
            <h2 class="error-title">Something went wrong</h2>
            <p id="errorMessage" class="error-message">An unexpected error occurred.</p>
            <div class="error-actions">
                <button id="errorRetry" class="btn">Reload</button>
            </div>
        </div>
    </div>
    <audio id="audioElement"></audio>
    <script src="app.js"></script>
    <script>
        const getEl = id => document.getElementById(id);
        const errorScreen = getEl('errorScreen');
        const errorMessageEl = getEl('errorMessage');
        const errorRetry = getEl('errorRetry');

        // Safely stop audio and reset UI
        function stopPlaybackCompletely() {
            const a = (typeof audio !== 'undefined' && audio) ? audio : getEl('audioElement');
            if (a) {
                a.pause ?.();
                a.src = '';
                a.load ?.();
            }

            const playBtn = getEl('btnPlayPause');
            if (playBtn) playBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>';

            const title = getEl('currentTitle'), artist = getEl('currentArtist'), art = getEl('currentArt');
            if (title) title.textContent = 'Not Playing';
            if (artist) artist.textContent = 'Select a song';
            if (art) art.src = 'placeholder.png';

            if (typeof currentIndex !== 'undefined') currentIndex = -1;
            if (navigator.mediaSession) navigator.mediaSession.metadata = null;
        }

        // Display the error
        function showError(msg) {
            if (!errorScreen || !errorMessageEl) return;
            errorMessageEl.textContent = String(msg || 'An unexpected error occurred.');
            errorScreen.style.display = 'flex';
            errorScreen.removeAttribute('hidden');
            stopPlaybackCompletely();
        }

        // Dismiss / Retry
        errorRetry ?.addEventListener('click', () => window.location.reload());

        // 1. Catch JS Runtime Errors AND Resource Load Errors (Images, CSS, etc.)
        window.addEventListener('error', (e) => {
            const isResource = e.target && (e.target.src || e.target.href);
            const msg = isResource ? `Resource failed to load: ${e.target.src || e.target.href}` : e.message;
            showError(`[Runtime/Resource] ${msg}`);
        }, true); // The 'true' enables capture phase, required to catch resource errors

        // 2. Catch Unhandled Promises
        window.addEventListener('unhandledrejection', (e) => {
            showError(`[Promise Rejection] ${e.reason ?.message || e.reason || 'Unknown error'}`);
        });

        // 3. Catch console.error logs
        const origError = console.error;
        console.error = (...args) => {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            showError(`[Console Error] ${msg}`);
            origError.apply(console, args);
        };

        // 4. Catch XHR (Ajax) Errors
        const origOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            this.addEventListener('error', () => showError(`[XHR Error] Network error for ${url}`));
            this.addEventListener('abort', () => showError(`[XHR Aborted] Request to ${url} aborted`));
            this.addEventListener('readystatechange', () => {
                if (this.readyState === 4 && ((this.status >= 400 && this.status < 600) || this.status === 0)) {
                    showError(`[XHR Failed] Status ${this.status} for ${url}`);
                }
            });
            return origOpen.apply(this, arguments);
        };

        // 5. Catch Fetch API Errors (Modern Networking)
        if (window.fetch) {
            const origFetch = window.fetch;
            window.fetch = async (...args) => {
                try {
                    const res = await origFetch(...args);
                    if (!res.ok) showError(`[Fetch Failed] Status ${res.status} for ${args[0]}`);
                    return res;
                } catch (err) {
                    showError(`[Fetch Network Error] ${err.message}`);
                    throw err;
                }
            };
        }
    </script>
</body>
</html>
