<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <title>DrayMusic</title>
    <link rel="stylesheet" href="style.css">
    <link href="google.css" rel="stylesheet">
    <link href="ms-appx-web:///lib/winjs-4.0.1/css/ui-dark.css" rel="stylesheet" />
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/base.js"></script>
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/ui.js"></script>
    <style>
        #errorScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #640000;
            font-family: system-ui;
        }

            #errorScreen[hidden] {
                display: none;
            }

        .error-inner {
            text-align: center;
        }

        .error-title {
            margin: 0 0 8px;
            color: #fff;
            font-size: 1.6rem;
        }

        .error-message {
            margin: 0 0 18px;
            color: #fff;
            line-height: 1.4;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 16px;
        }

            .btn:hover {
                background: #ffffff30;
            }

            .btn:active {
                background: #fff;
                color: #000;
            }
    </style>
</head>
<body class="win-type-body">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">
    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>
    <main id="songList" class="scroll-area">
    </main>
    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>
            <div class="action-btns">
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>
    <div id="errorScreen" aria-live="assertive" role="alert" hidden>
        <div class="error-inner">
            <h2 class="error-title">Something went wrong</h2>
            <p id="errorMessage" class="error-message">An unexpected error occurred.</p>
            <div class="error-actions">
                <button id="errorRetry" class="btn">Reload</button>
            </div>
        </div>
    </div>
    <audio id="audioElement"></audio>
    <script src="app.js"></script>
    <script>
        // 1. Clean event binder for legacy support (IE8+)
        function bindEvent(el, evt, fn, capture) {
            if (!el) return;
            if (el.addEventListener) {
                el.addEventListener(evt, fn, !!capture);
            } else if (el.attachEvent) {
                el.attachEvent('on' + evt, fn);
            }
        }

        var errorScreen = document.getElementById('errorScreen');
        var errorMessageEl = document.getElementById('errorMessage');
        var errorRetry = document.getElementById('errorRetry');

        // 2. Safely stop audio and reset UI
        function stopPlaybackCompletely() {
            var a = (typeof audio !== 'undefined' && audio) ? audio : document.getElementById('audioElement');
            if (a) {
                if (a.pause) a.pause();
                a.src = '';
                if (a.load) a.load();
            }

            var playBtn = document.getElementById('btnPlayPause');
            var title = document.getElementById('currentTitle');
            var artist = document.getElementById('currentArtist');
            var art = document.getElementById('currentArt');

            if (playBtn) playBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>';
            if (title) title.innerText = 'Not Playing';
            if (artist) artist.innerText = 'Select a song';
            if (art) art.src = 'placeholder.png';

            if (typeof currentIndex !== 'undefined') currentIndex = -1;
        }

        // 3. Display the error
        function showError(msg) {
            if (!errorScreen || !errorMessageEl) return;

            // innerText is safer for very old browsers than textContent
            errorMessageEl.innerText = String(msg || 'An unexpected error occurred.');
            errorScreen.style.display = 'flex';

            if (errorScreen.removeAttribute) {
                errorScreen.removeAttribute('hidden');
            }

            stopPlaybackCompletely();
        }

        bindEvent(errorRetry, 'click', function () {
            window.location.reload();
        });

        // 4. Catch Global JS Errors & Resource (Image/CSS) Errors
        bindEvent(window, 'error', function (e) {
            var target = e.target || e.srcElement;

            // If it's the window object, it's a JS syntax/runtime error
            if (target === window) {
                showError('[Runtime Error] ' + e.message);
                return;
            }

            // If it's an element (img, script, link), it's a resource error
            var src = target.src || target.href;
            if (src) {
                // FILTER: Ignore errors from .html files (like your index.html)
                if (src.indexOf('.html') !== -1) return;

                showError('[Resource Failed] ' + src);
            }
        }, true);

        // 5. Catch Promise Rejections (If polyfilled or in newer browsers)
        bindEvent(window, 'unhandledrejection', function (e) {
            var reason = e.reason || 'Unknown error';
            showError('[Promise Rejection] ' + (reason.message || reason));
        });

        // 6. Catch console.error logs
        if (window.console && console.error) {
            var origError = console.error;
            console.error = function () {
                var parts = [];
                for (var i = 0; i < arguments.length; i++) {
                    var arg = arguments[i];
                    parts.push(typeof arg === 'object' ? JSON.stringify(arg) : String(arg));
                }
                showError('[Console Error] ' + parts.join(' '));
                if (origError.apply) origError.apply(console, arguments);
            };
        }

        // 7. Catch XHR (Ajax) Errors cleanly
        if (typeof XMLHttpRequest !== 'undefined') {
            var origOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function (method, url) {
                var xhr = this;
                bindEvent(xhr, 'error', function () { showError('[XHR Error] Network error for ' + url); });
                bindEvent(xhr, 'abort', function () { showError('[XHR Aborted] Request to ' + url + ' aborted'); });
                bindEvent(xhr, 'readystatechange', function () {
                    if (xhr.readyState === 4 && ((xhr.status >= 400 && xhr.status < 600) || xhr.status === 0)) {
                        showError('[XHR Failed] Status ' + xhr.status + ' for ' + url);
                    }
                });
                return origOpen.apply(xhr, arguments);
            };
        }
    </script>
</body>
</html>
