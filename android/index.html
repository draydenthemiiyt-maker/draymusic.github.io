<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <title>DrayMusic</title>
    <link rel="stylesheet" href="style.css">
    <link href="google.css" rel="stylesheet">
    <style>
        #errorScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #640000;
            font-family: system-ui;
        }

            #errorScreen[hidden] {
                display: none;
            }

        .error-inner {
            text-align: center;
        }

        .error-title {
            margin: 0 0 8px;
            color: #fff;
            font-size: 1.6rem;
        }

        .error-message {
            margin: 0 0 18px;
            color: #fff;
            line-height: 1.4;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 16px;
        }

            .btn:hover {
                background: #ffffff30;
            }

            .btn:active {
                background: #fff;
                color: #000;
            }
    </style>
</head>
<body class="native-app">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">
    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>
    <main id="songList" class="scroll-area">
    </main>
    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>
            <div class="action-btns">
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>
    <div id="errorScreen" aria-live="assertive" role="alert" hidden>
        <div class="error-inner">
            <h2 class="error-title">Something went wrong</h2>
            <p id="errorMessage" class="error-message">An unexpected error occurred.</p>
            <div class="error-actions">
                <button id="errorRetry" class="btn">Reload</button>
            </div>
        </div>
    </div>
    <audio id="audioElement"></audio>
    <script src="app.js"></script>
    <script>
        function _on(el, evt, fn) {
            if (!el) return;
            try {
                if (el.addEventListener) el.addEventListener(evt, fn, false);
                else if (el.attachEvent) el.attachEvent('on' + evt, fn);
                else el['on' + evt] = fn;
            } catch (e) { try { el['on' + evt] = fn; } catch (e2) { } }
        }
        function _setText(el, text) {
            if (!el) return;
            try {
                if (typeof el.textContent !== 'undefined') el.textContent = text;
                else el.innerText = text;
            } catch (e) { try { el.innerText = text; } catch (e2) { } }
        }

        var errorScreen = document.getElementById('errorScreen');
        var errorMessageEl = document.getElementById('errorMessage');
        var errorRetry = document.getElementById('errorRetry');
        var errorDismiss = document.getElementById('errorDismiss');

        function stopPlaybackCompletely() {
            try {
                var a = (typeof audio !== 'undefined' && audio) ? audio : document.getElementById('audioElement');
                if (a) {
                    try { if (typeof a.pause === 'function') a.pause(); } catch (e) { }
                    try { a.src = ''; } catch (e) { }
                    try { if (typeof a.load === 'function') a.load(); } catch (e) { }
                }
                var playBtn = document.getElementById('btnPlayPause');
                var titleEl = document.getElementById('currentTitle');
                var artistEl = document.getElementById('currentArtist');
                var artEl = document.getElementById('currentArt');
                if (playBtn) try { playBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>'; } catch (e) { }
                if (titleEl) _setText(titleEl, 'Not Playing');
                if (artistEl) _setText(artistEl, 'Select a song');
                if (artEl) try { artEl.src = 'placeholder.png'; } catch (e) { }
                try { if (typeof currentIndex !== 'undefined') currentIndex = -1; } catch (e) { }
                try {
                    if (typeof navigator !== 'undefined' && navigator.mediaSession && typeof navigator.mediaSession.metadata !== 'undefined') {
                        try { navigator.mediaSession.metadata = null; } catch (e) { }
                    }
                } catch (e) { }
            } catch (e) { try { if (console && console.warn) console.warn('stopPlayback error', e); } catch (e2) { } }
        }

        function showErrorOverlay(message, options) {
            options = options || {};
            if (!errorScreen || !errorMessageEl) return;
            try {
                _setText(errorMessageEl, String(message || 'An unexpected error occurred.'));
                try {
                    if (errorScreen.removeAttribute) errorScreen.removeAttribute('hidden');
                    else errorScreen.style.display = 'flex';
                } catch (e) { try { errorScreen.style.display = 'flex'; } catch (e2) { } }
                stopPlaybackCompletely();
                if (!options.silent) {
                    try { if (console && console.error) console.error('App error shown to user:', message); } catch (e) { }
                }
            } catch (e) { }
        }
        function hideErrorOverlay() {
            if (!errorScreen) return;
            try {
                if (errorScreen.setAttribute) errorScreen.setAttribute('hidden', '');
                else errorScreen.style.display = 'none';
            } catch (e) { try { errorScreen.style.display = 'none'; } catch (e2) { } }
        }

        if (errorRetry) _on(errorRetry, 'click', function () {
            hideErrorOverlay();
            try {
                window.location.reload();
            } catch (e) {
                try { window.location.href = window.location.href; } catch (e2) { }
            }
        });

        function reportError(kind, message, extra) {
            try {
                var composed = '[' + kind + '] ' + (message || 'Unknown error');
                if (extra) {
                    try { composed += ' | ' + JSON.stringify(extra); } catch (e) { composed += ' | ' + String(extra); }
                }
                showErrorOverlay(composed, { silent: true });
            } catch (e) { }
        }

        if (typeof window !== 'undefined') {
            try {
                window.onerror = function (msg, url, lineNo, colNo, err) {
                    try {
                        var m = (msg && typeof msg === 'string') ? msg : String(msg);
                        var src = url || 'unknown';
                        var loc = (lineNo ? (':' + lineNo) : '');
                        reportError('Runtime error', m + ' (' + src + loc + ')', err || null);
                    } catch (e) { }
                    return false;
                };
            } catch (e) { }
        }

        (function wrapConsoleError() {
            try {
                if (!window.console) window.console = {};
                var orig = console.error || function () { };
                console.error = function () {
                    try {
                        var parts = [];
                        for (var i = 0; i < arguments.length; i++) {
                            var a = arguments[i];
                            if (typeof a === 'string') parts.push(a);
                            else if (a && a.message) parts.push(a.message);
                            else {
                                try { parts.push(JSON.stringify(a)); } catch (e) { parts.push(String(a)); }
                            }
                        }
                        var msg = parts.join(' ');
                        reportError(msg);
                    } catch (e) { }
                    try { orig.apply(console, arguments); } catch (e) { }
                };
            } catch (e) { }
        })();

        (function wrapXHR() {
            try {
                if (typeof XMLHttpRequest === 'undefined') return;
                var OldXHR = XMLHttpRequest;
                function NewXHR() {
                    var xhr = new OldXHR();
                    try {
                        var origOpen = xhr.open;
                        xhr.open = function (method, url, async) {
                            try { xhr._url = url; } catch (e) { }
                            return origOpen.apply(xhr, arguments);
                        };
                    } catch (e) { }
                    try {
                        _on(xhr, 'readystatechange', function () {
                            try {
                                if (xhr.readyState === 4) {
                                    try {
                                        var status = xhr.status;
                                        /* In some environments status 0 indicates network error for file:// or CORS; treat as possible error */
                                        if ((status >= 400 && status < 600) || status === 0) {
                                            reportError('XHR error', 'Request failed: ' + (xhr._url || 'unknown') + ' status:' + status, { responseURL: xhr._url, status: status });
                                        }
                                    } catch (e) { }
                                }
                            } catch (e) { }
                        });
                        _on(xhr, 'error', function () {
                            try { reportError('XHR network error', 'Network error for ' + (xhr._url || 'unknown')); } catch (e) { }
                        });
                        _on(xhr, 'abort', function () {
                            try { reportError('XHR aborted', 'Request aborted ' + (xhr._url || 'unknown')); } catch (e) { }
                        });
                    } catch (e) { }
                    return xhr;
                }
                try { window.XMLHttpRequest = NewXHR; } catch (e) { }
            } catch (e) { }
        })();

        (function watchResources() {
            try {
                function attachImgHandlers() {
                    try {
                        var imgs = document.getElementsByTagName('img');
                        for (var i = 0; i < imgs.length; i++) {
                            try {
                                var im = imgs[i];
                                if (!im._errorHooked) {
                                    im._errorHooked = true;
                                    _on(im, 'error', function () {
                                        try { reportError('Resource error', 'Image failed to load: ' + (this && this.src ? this.src : 'unknown')); } catch (e) { }
                                    });
                                }
                            } catch (e) { }
                        }
                    } catch (e) { }
                }
                attachImgHandlers();
                try { setInterval(attachImgHandlers, 2000); } catch (e) { }
            } catch (e) { }
        })();

        try {
            if (window.addEventListener) {
                window.addEventListener('unhandledrejection', function (ev) {
                    try {
                        var reason = (ev && ev.reason) ? ev.reason : 'Promise rejected';
                        var text;
                        if (typeof reason === 'string') text = reason;
                        else if (reason && reason.message) text = reason.message;
                        else {
                            try { text = JSON.stringify(reason); } catch (e) { text = String(reason); }
                        }
                        reportError('Unhandled rejection', text);
                    } catch (e) { }
                }, false);
            } else if (window.onunhandledrejection) {
                _on(window, 'unhandledrejection', function (ev) {
                    try { reportError('Unhandled rejection', String(ev)); } catch (e) { }
                });
            }
        } catch (e) { }
    </script>
</body>
</html>
