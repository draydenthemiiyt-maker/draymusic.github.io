<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>DrayMusic</title>
    <link rel="stylesheet" id="stylesheet" href="">
    <link href="google.css" rel="stylesheet">
</head>
<body class="native-app">
    <img id="body-bg" src="gradient.gif" aria-hidden="true">

    <header class="app-header">
        <h1>DrayMusic</h1>
        <div class="search-pill">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
        </div>
    </header>

    <main id="songList" class="scroll-area">
    </main>

    <section class="mini-player">
        <div class="progress-wrapper">
            <input type="range" id="seekBar" value="0" step="0.1">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="player-controls-row">
            <div class="track-info" id="openFullPlayer">
                <img id="currentArt" src="placeholder.png">
                <div class="text-group">
                    <h4 id="currentTitle">Not Playing</h4>
                    <p id="currentArtist">Select a song</p>
                </div>
            </div>

            <div class="action-btns">
                <button id="btnLoop" class="icon-btn"><span class="material-symbols-rounded">repeat</span></button>
                <button id="btnPrev" class="icon-btn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="btnPlayPause" class="main-play-btn"><span class="material-symbols-rounded">play_arrow</span></button>
                <button id="btnNext" class="icon-btn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>
    </section>

    <audio id="audioElement"></audio>
    <script id="javascript" src=""></script>
<script>
(function () {
  'use strict';

  // Detect UWP / Windows Runtime presence
  var isWindows = !!(window.Windows && (Windows.System || Windows.UI || Windows.Foundation));

  // Elements by ID (as provided)
  var styleEl = document.getElementById('stylesheet');
  var scriptEl = document.getElementById('javascript');
  var body = document.body || document.getElementsByTagName('body')[0];

  // Paths
  var stylePath = isWindows ? 'windows/style.css' : 'style.css';
  var scriptPath = isWindows ? 'windows/app.js' : 'app.js';

  // Set or create stylesheet link
  if (styleEl) {
    try { styleEl.setAttribute('href', stylePath); } catch (e) { styleEl.href = stylePath; }
  } else {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.id = 'stylesheet';
    link.href = stylePath;
    var head = document.getElementsByTagName('head')[0] || document.documentElement;
    head.appendChild(link);
  }

  // Set or create main script tag
  if (scriptEl) {
    try { scriptEl.setAttribute('src', scriptPath); } catch (e) { scriptEl.src = scriptPath; }
    // If the script tag was previously empty and is already in the DOM, re-inserting it ensures it executes.
    // Create a new script element and replace the old one to guarantee execution.
    var shouldReplace = !!(scriptEl.getAttribute('src') && scriptEl.getAttribute('src') === scriptPath && !scriptEl.hasAttribute('data-executed'));
    if (shouldReplace) {
      var newScript = document.createElement('script');
      newScript.id = scriptEl.id || '';
      newScript.src = scriptPath;
      // preserve async/defer if present
      if (scriptEl.async) newScript.async = true;
      if (scriptEl.defer) newScript.defer = true;
      // copy other attributes except src
      for (var i = 0; i < scriptEl.attributes.length; i++) {
        var attr = scriptEl.attributes[i];
        if (attr.name !== 'src' && attr.name !== 'id') newScript.setAttribute(attr.name, attr.value);
      }
      scriptEl.parentNode.replaceChild(newScript, scriptEl);
      // mark executed to avoid double-replace if this runs again
      newScript.setAttribute('data-executed', '1');
    }
  } else {
    var s = document.createElement('script');
    s.id = 'javascript';
    s.src = scriptPath;
    document.body.appendChild(s);
  }

  // Toggle win-type-body class on <body>
  if (body) {
    if (isWindows) {
      if (body.classList) {
        body.classList.add('win-type-body');
      } else {
        // IE9 fallback
        var cls = (' ' + body.className + ' ').replace(/\s+/g, ' ');
        if (cls.indexOf(' win-type-body ') === -1) body.className = (body.className + ' win-type-body').trim();
      }
    } else {
      if (body.classList) {
        body.classList.remove('win-type-body');
      } else {
        body.className = body.className.replace(/\bwin-type-body\b/g, '').replace(/\s+/g, ' ').trim();
      }
    }
  }
})();
</script>
</body>
</html>
